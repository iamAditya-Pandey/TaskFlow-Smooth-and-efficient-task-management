<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #050505, #150f0a);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(249, 115, 22, 0.3);
      padding: 3rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 30px rgba(234, 88, 12, 0.1);
    }
    h1 { color: #f97316; margin-bottom: 0.5rem; }
    p { color: #aaa; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #ea580c;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>TaskFlow</h1>
    <p>Smooth and efficient task management.</p>
    <a href="#" class="btn">Get Started</a>
  </div>
</body>
</html>
